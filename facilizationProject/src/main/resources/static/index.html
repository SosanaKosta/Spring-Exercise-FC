<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facilization Project Management</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --danger: #dc2626;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .screen { display: none; background: var(--card); padding: 24px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 20px; }
        .screen.active { display: block; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-weight: 6px; font-size: 14px; }
        input, textarea, select { width: 100%; padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-weight: 500; }
        button:hover { opacity: 0.9; }
        .btn-alt { background: #64748b; }
        .error { color: var(--danger); font-size: 13px; margin-top: 4px; display: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-top: 16px; }
        .card { background: var(--bg); padding: 16px; border-radius: 6px; border: 1px solid #e2e8f0; cursor: pointer; position: relative; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; color: white; }
        .badge.todo { background: #64748b; }
        .badge.high { background: var(--danger); }
        .filters { display: flex; gap: 12px; margin-bottom: 16px; background: #f1f5f9; padding: 12px; border-radius: 6px; }
        .filters select { width: auto; }
        .actions { position: absolute; top: 12px; right: 12px; display: flex; gap: 6px; }
        .sm-btn { padding: 4px 8px; font-size: 12px; }
        .danger-btn { background: var(--danger); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>Facilization Board</h2>
        <div id="auth-status">
            <button onclick="showScreen('login-screen')">Login / Register</button>
        </div>
    </header>

    <div id="login-screen" class="screen active">
        <h3>Account Access</h3>
        <div style="display: flex; gap: 20px; margin-bottom: 20px;">
            <label><input type="radio" name="auth-mode" value="login" checked onchange="toggleAuthMode()"> Sign In</label>
            <label><input type="radio" name="auth-mode" value="register" onchange="toggleAuthMode()"> Create Account</label>
        </div>
        <form id="auth-form" onsubmit="handleAuth(event)">
            <div class="form-group">
                <label for="auth-username">Username</label>
                <input type="text" id="auth-username" required minlength="3">
            </div>
            <div class="form-group id-register-only" style="display: none;">
                <label for="auth-email">Email</label>
                <input type="email" id="auth-email">
                <div id="email-error" class="error">Please enter a valid email address.</div>
            </div>
            <div class="form-group">
                <label for="auth-password">Password</label>
                <input type="password" id="auth-password" required minlength="6">
            </div>
            <button type="submit" id="auth-submit-btn">Sign In</button>
        </form>
    </div>

    <div id="project-screen" class="screen">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3>Your Projects</h3>
            <button onclick="toggleElement('project-form-container')">+ New Project</button>
        </div>

        <div id="project-form-container" style="display: none; margin-top: 15px; padding: 15px; background: #f1f5f9; border-radius: 6px;">
            <h4>Create Project</h4>
            <form id="project-form" onsubmit="handleCreateProject(event)">
                <div class="form-group">
                    <label>Project Name</label>
                    <input type="text" id="proj-name" required minlength="3">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="proj-desc" rows="2"></textarea>
                </div>
                <button type="submit">Save Project</button>
                <button type="button" class="btn-alt" onclick="toggleElement('project-form-container')">Cancel</button>
            </form>
        </div>

        <div id="project-list" class="grid"></div>
    </div>

    <div id="task-screen" class="screen">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <button class="btn-alt" onclick="showScreen('project-screen')">&larr; Back to Projects</button>
            <h3 id="current-project-title">Project Tasks</h3>
            <button onclick="showTaskForm()">+ Create Task</button>
        </div>

        <div class="filters">
            <select id="filter-status" onchange="loadTasks()">
                <option value="">All Statuses</option>
                <option value="TODO">TODO</option>
                <option value="IN_PROGRESS">IN_PROGRESS</option>
                <option value="DONE">DONE</option>
            </select>
        </div>

        <div id="task-list" class="grid"></div>
    </div>

    <div id="task-form-screen" class="screen">
        <h3 id="task-form-title">Create New Task</h3>
        <form id="task-form" onsubmit="handleSaveTask(event)">
            <input type="hidden" id="task-id">
            <div class="form-group">
                <label>Task Title</label>
                <input type="text" id="task-title" required minlength="3" maxlength="100">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="task-desc" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label>Priority</label>
                <select id="task-priority" required>
                    <option value="LOW">LOW</option>
                    <option value="MEDIUM">MEDIUM</option>
                    <option value="HIGH">HIGH</option>
                </select>
            </div>
            <div class="form-group">
                <label>Status</label>
                <select id="task-status" required>
                    <option value="TODO">TODO</option>
                    <option value="IN_PROGRESS">IN_PROGRESS</option>
                    <option value="DONE">DONE</option>
                </select>
            </div>
            <div class="form-group">
                <label>Due Date</label>
                <input type="date" id="task-duedate">
            </div>
            <div class="form-group">
                <label>Assignee User ID (Optional)</label>
                <input type="number" id="task-assignee-id" placeholder="e.g. 1">
            </div>
            <button type="submit">Save Task</button>
            <button type="button" class="btn-alt" onclick="showScreen('task-screen')">Cancel</button>
        </form>
    </div>
</div>

<script>
    const API_BASE = "http://localhost:8080/api";
    let authHeader = null;
    let currentProjectId = null;
    let currentUserId = null;

    // --- APPLICATION ROUTING ---
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function toggleElement(id) {
        const el = document.getElementById(id);
        el.style.display = el.style.display === 'none' ? 'block' : 'none';
    }

    function toggleAuthMode() {
        const mode = document.querySelector('input[name="auth-mode"]:checked').value;
        const registerFields = document.querySelectorAll('.id-register-only');
        const submitBtn = document.getElementById('auth-submit-btn');

        if (mode === 'register') {
            registerFields.forEach(f => f.style.display = 'block');
            submitBtn.innerText = 'Create Account';
        } else {
            registerFields.forEach(f => f.style.display = 'none');
            submitBtn.innerText = 'Sign In';
        }
    }

    // --- SECURITY & API LAYER ---
    async function apiRequest(url, method = 'GET', body = null) {
        const headers = { 'Content-Type': 'application/json' };
        if (authHeader) headers['Authorization'] = authHeader;

        const config = { method, headers };
        if (body) config.body = JSON.stringify(body);

        const response = await fetch(url, config);

        if (response.status === 401) {
            alert("Session unauthorized. Please check your system credentials.");
            showScreen('login-screen');
            throw new Error("Unauthorized");
        }
        if (!response.ok) {
            const errData = await response.json().catch(() => ({ message: "Unknown system error occurred" }));
            throw new Error(errData.message || "API call error");
        }

        if (response.status === 204) return null;
        return response.json();
    }

    // --- SCREEN ACTIONS ---
    async function handleAuth(event) {
        event.preventDefault();
        const mode = document.querySelector('input[name="auth-mode"]:checked').value;
        const username = document.getElementById('auth-username').value;
        const password = document.getElementById('auth-password').value;

        if (mode === 'register') {
            const email = document.getElementById('auth-email').value;
            if (!email.includes('@')) {
                document.getElementById('email-error').style.display = 'block';
                return;
            }
            document.getElementById('email-error').style.display = 'none';

            try {
                await apiRequest(`${API_BASE}/users`, 'POST', { username, email, password });
                alert("Account created successfully! Switching to sign-in mode.");
                document.querySelector('input[name="auth-mode"][value="login"]').checked = true;
                toggleAuthMode();
            } catch (err) { alert(err.message); }
        } else {
            // Apply Basic Auth Hashing Strategy
            authHeader = 'Basic ' + btoa(username + ':' + password);
            try {
                // Confirm user identity via paginated validation endpoint
                const data = await apiRequest(`${API_BASE}/users?size=1`);

                // Track dynamic ID mappings out of server elements array
                if(data.content && data.content.length > 0) {
                    currentUserId = data.content[0].id;
                }

                document.getElementById('auth-status').innerHTML = `<span>Active profile: <strong>${username}</strong></span> <button class="btn-alt sm-btn" onclick="location.reload()">Sign Out</button>`;
                loadProjects();
                showScreen('project-screen');
            } catch (err) {
                authHeader = null;
                alert("Authentication mismatch: " + err.message);
            }
        }
    }

    async function loadProjects() {
        try {
            const projects = await apiRequest(`${API_BASE}/projects`);
            const container = document.getElementById('project-list');
            container.innerHTML = '';

            // Handle unwrapped Arrays or Spring Data Page responses
            const list = Array.isArray(projects) ? projects : (projects.content || []);

            list.forEach(p => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<h4>${p.name}</h4><p>${p.description || 'No description provided.'}</p>`;
                card.onclick = () => selectProject(p.id, p.name);
                container.appendChild(card);
            });
        } catch (err) { console.error(err.message); }
    }

    async function handleCreateProject(event) {
        event.preventDefault();
        const name = document.getElementById('proj-name').value;
        const description = document.getElementById('proj-desc').value;

        try {
            await apiRequest(`${API_BASE}/projects`, 'POST', { name, description });
            document.getElementById('project-form').reset();
            toggleElement('project-form-container');
            loadProjects();
        } catch (err) { alert(err.message); }
    }

    function selectProject(id, name) {
        currentProjectId = id;
        document.getElementById('current-project-title').innerText = `Project: ${name}`;
        loadTasks();
        showScreen('task-screen');
    }

    async function loadTasks() {
        const status = document.getElementById('filter-status').value;
        // Connects to your TaskController @GetMapping("/projects/{projectId}/tasks")
        let url = `${API_BASE}/task/projects/${currentProjectId}/tasks?page=0&size=50`;
        if (status) url += `&statusEnum=${status}`;

        try {
            const data = await apiRequest(url);
            const container = document.getElementById('task-list');
            container.innerHTML = '';

            const tasks = data.content || [];
            tasks.forEach(t => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h5>${t.title}</h5>
                    <p>${t.description || ''}</p>
                    <div><span class="badge todo">${t.status}</span> <span class="badge high">${t.priority}</span></div>
                    <small style="display:block; margin-top:8px;">Due: ${t.dueDate || 'No Date Specified'}</small>
                    <div class="actions">
                        <button class="sm-btn" onclick="event.stopPropagation(); loadSingleTaskForEdit(${t.id})">Edit</button>
                        <button class="sm-btn danger-btn" onclick="event.stopPropagation(); handleDeleteTask(${t.id})">X</button>
                    </div>
                `;
                container.appendChild(card);
            });
        } catch (err) { console.error(err.message); }
    }

    function showTaskForm(task = null) {
        const form = document.getElementById('task-form');
        form.reset();

        if (task) {
            document.getElementById('task-form-title').innerText = "Edit Task Parameters";
            document.getElementById('task-id').value = task.id;
            document.getElementById('task-title').value = task.title;
            document.getElementById('task-desc').value = task.description;
            document.getElementById('task-priority').value = task.priority;
            document.getElementById('task-status').value = task.status;
            document.getElementById('task-duedate').value = task.dueDate || '';
            document.getElementById('task-assignee-id').value = task.userDTO ? task.userDTO.id : '';
        } else {
            document.getElementById('task-form-title').innerText = "Create New Task Target";
            document.getElementById('task-id').value = '';
        }
        showScreen('task-form-screen');
    }

    async function loadSingleTaskForEdit(id) {
        try {
            const task = await apiRequest(`${API_BASE}/task/tasks/${id}`, 'GET');
            showTaskForm(task);
        } catch (err) { alert(err.message); }
    }

    async function handleSaveTask(event) {
        event.preventDefault();
        const id = document.getElementById('task-id').value;

        const payload = {
            title: document.getElementById('task-title').value,
            description: document.getElementById('task-desc').value,
            priority: document.getElementById('task-priority').value,
            status: document.getElementById('task-status').value,
            dueDate: document.getElementById('task-duedate').value || null,
            projectDTO: { id: currentProjectId }
        };

        const assigneeId = document.getElementById('task-assignee-id').value;
        if (assigneeId) {
            payload.userDTO = { id: parseInt(assigneeId) };
        }

        try {
            if (id) {
                // Target PUT: @PutMapping("/task/{id}")
                await apiRequest(`${API_BASE}/task/task/${id}`, 'PUT', payload);
            } else {
                // Target POST: @PostMapping("/projects/{projectId}/tasks")
                await apiRequest(`${API_BASE}/task/projects/${currentProjectId}/tasks`, 'POST', payload);
            }
            showScreen('task-screen');
            loadTasks();
        } catch (err) { alert(err.message); }
    }

    async function handleDeleteTask(id) {
        if (!confirm("Are you sure you want to delete this task?")) return;
        try {
            await apiRequest(`${API_BASE}/task/tasks/${id}`, 'DELETE');
            loadTasks();
        } catch (err) { alert(err.message); }
    }
</script>
</body>
</html>
